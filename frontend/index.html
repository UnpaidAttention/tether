<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tether</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="auth-banner-slot"></div>
  <header class="topbar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M7 7 Q 16 14 7 25" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
        <path d="M25 7 Q 16 14 25 25" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
        <circle cx="16" cy="16" r="2" fill="currentColor" />
      </svg>
      <h1>Tether</h1>
      <span class="brand-sub">git remotes, at a glance</span>
    </div>
    <div class="topbar-meta" id="meta-bar"></div>
    <div class="topbar-actions">
      <button id="btn-rescan" class="btn btn-ghost">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13.5 7a5.5 5.5 0 1 0-1.4 4.9M13.5 3v4h-4" />
        </svg>
        Rescan
      </button>
      <button id="btn-quit" class="btn btn-ghost btn-quit" title="Stop the Tether server">Quit</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="search-wrap">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <circle cx="7" cy="7" r="4.5" />
          <path d="m13 13-2.5-2.5" />
        </svg>
        <input type="search" id="search" placeholder="Filter repos…" autocomplete="off" />
        <kbd class="kbd">/</kbd>
      </div>
      <nav id="repo-list" class="repo-list" aria-label="Repositories">
        <div class="list-state list-state--loading">
          <span class="spinner"></span>
          Scanning your home directory…
        </div>
      </nav>
    </aside>

    <section class="detail" id="detail" aria-live="polite">
      <div class="detail-empty">
        <svg viewBox="0 0 64 64" width="64" height="64" aria-hidden="true" class="detail-empty-art">
          <path d="M12 18 Q 32 34 12 50" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.3" />
          <path d="M52 18 Q 32 34 52 50" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.3" />
          <circle cx="32" cy="34" r="3" fill="currentColor" opacity="0.5" />
        </svg>
        <h2>Pick a repository</h2>
        <p>Select one from the left to inspect its remotes, branches, and GitHub state. Use <kbd class="kbd">↑ ↓</kbd> to navigate, <kbd class="kbd">/</kbd> to search.</p>
      </div>
    </section>
  </main>

  <div id="modal-root" class="modal-root" aria-hidden="true"></div>
  <div id="toast-root" class="toast-root" aria-live="polite"></div>

  <script src="/static/app.js"></script>
</body>
</html>
